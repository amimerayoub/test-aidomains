<!-- ================================================================
     SETTINGS PANEL — Password Input Fix
     Replace the existing settings body content with this snippet.
     The <form> wrapper resolves the browser warning about password
     fields not being inside a form element.
     ================================================================ -->

<!-- BEFORE: Password inputs were floating outside any form element.
     This triggers: "Password field is not contained in a form" warning. -->

<!-- AFTER: All inputs wrapped in a proper form with autocomplete hints -->

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel" id="settingsPanel">

    <div class="settings-header">
      <h3 class="settings-title">API Settings</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn-action-sm" id="btnGetApiKeys">Get API Keys</button>
        <button class="settings-close" id="settingsClose" type="button">
          <svg viewBox="0 0 24 24" fill="none" style="width:16px;height:16px">
            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- FIX: Wrap ALL inputs in a <form> to resolve password field warning -->
    <form
      id="settingsForm"
      class="settings-body"
      autocomplete="off"
      onsubmit="return false;"
    >
      <!-- autocomplete="new-password" on each field prevents browser autofill on API key fields -->

      <div class="settings-section-label">AI Providers</div>

      <div class="form-row">
        <label class="form-label" for="settingsGeminiKey">Gemini API Key</label>
        <input
          type="password"
          class="input-primary"
          id="settingsGeminiKey"
          name="geminiKey"
          placeholder="AIza... (from ai.google.dev)"
          autocomplete="new-password"
        />
      </div>

      <div class="form-row">
        <label class="form-label" for="settingsGrokKey">Grok API Key (xAI)</label>
        <input
          type="password"
          class="input-primary"
          id="settingsGrokKey"
          name="grokKey"
          placeholder="xai-... (from x.ai)"
          autocomplete="new-password"
        />
      </div>

      <div class="settings-section-label" style="margin-top:20px">News Sources (optional)</div>

      <div class="settings-keys-grid">
        <div class="form-row">
          <label class="form-label" for="settingsMediastackKey">MediaStack</label>
          <input
            type="password"
            class="input-primary"
            id="settingsMediastackKey"
            name="mediastackKey"
            placeholder="MediaStack API key"
            autocomplete="new-password"
            style="font-size:.78rem;padding:8px 10px"
          />
        </div>

        <div class="form-row">
          <label class="form-label" for="settingsGnewsKey">GNews</label>
          <input
            type="password"
            class="input-primary"
            id="settingsGnewsKey"
            name="gnewsKey"
            placeholder="GNews API key"
            autocomplete="new-password"
            style="font-size:.78rem;padding:8px 10px"
          />
        </div>

        <div class="form-row">
          <label class="form-label" for="settingsNewsapiKey">NewsAPI</label>
          <input
            type="password"
            class="input-primary"
            id="settingsNewsapiKey"
            name="newsapiKey"
            placeholder="NewsAPI key"
            autocomplete="new-password"
            style="font-size:.78rem;padding:8px 10px"
          />
        </div>

        <div class="form-row">
          <label class="form-label" for="settingsCurrentsKey">Currents</label>
          <input
            type="password"
            class="input-primary"
            id="settingsCurrentsKey"
            name="currentsKey"
            placeholder="Currents API key"
            autocomplete="new-password"
            style="font-size:.78rem;padding:8px 10px"
          />
        </div>
      </div>

    </form>
    <!-- END of <form> — all inputs are now properly contained -->

    <div class="settings-footer">
      <!-- This button is OUTSIDE the form intentionally — it calls a JS handler,
           not a form submit. The form's onsubmit="return false;" prevents any
           accidental page reloads. -->
      <button class="btn-generate" id="btnSaveSettings" type="button" style="margin:0">
        Save All Keys
      </button>
    </div>

  </div>
</div>
